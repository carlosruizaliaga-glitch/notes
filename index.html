<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>> Carlos Notes //</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #ffffff;
  --bg2:    #f5f5f5;
  --bg3:    #eeeeee;
  --line:   #ddd;
  --text:   #000;
  --dim:    #666;
  --green-bg:  #f0f0f0; --green-bd:  #ddd;
  --cyan-bg:   #f0f0f0; --cyan-bd:   #ddd;
  --purple-bg: #f0f0f0; --purple-bd: #ddd;
  --orange-bg: #f0f0f0; --orange-bd: #ddd;
  --red-bg:    #f0f0f0; --red-bd:    #ddd;
  --yellow-bg: #f0f0f0; --yellow-bd: #ddd;
}
html, body { height: 100%; font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); font-size: 13px; }
body { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
button { font-family: 'JetBrains Mono', monospace; cursor: pointer; }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

#auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
#auth-box { background: var(--bg); border: 2px solid var(--text); border-radius: 0; padding: 40px 36px; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 20px; }
#auth-logo { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
#auth-sub { font-size: 11px; color: var(--dim); }
#auth-tabs { display: flex; gap: 0; background: transparent; border-radius: 0; padding: 0; border-bottom: 2px solid var(--text); }
.auth-tab { flex: 1; background: none; border: none; padding: 8px; font-size: 12px; font-weight: 700; color: var(--dim); border-radius: 0; transition: all 0.15s; letter-spacing: 0.04em; border-bottom: 2px solid transparent; }
.auth-tab.on { background: none; color: var(--text); border-bottom: 2px solid var(--text); }
.auth-field { display: flex; flex-direction: column; gap: 6px; }
.auth-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); }
.auth-input { background: var(--bg); border: 1px solid var(--text); border-radius: 0; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text); outline: none; padding: 9px 12px; transition: border-color 0.15s; }
.auth-input:focus { border: 2px solid var(--text); }
#auth-btn { background: var(--text); border: none; border-radius: 0; font-size: 13px; font-weight: 700; color: var(--bg); padding: 10px; letter-spacing: 0.04em; transition: opacity 0.15s; margin-top: 4px; }
#auth-btn:hover { opacity: 0.8; }
#auth-err { font-size: 11px; color: #ff0000; min-height: 16px; }
#auth-ok { font-size: 11px; color: #00aa00; min-height: 16px; }

#topbar { display: flex; align-items: center; gap: 14px; padding: 10px 20px; border-bottom: 3px solid var(--text); background: var(--bg); flex-shrink: 0; }
#logo { font-size: 14px; font-weight: 700; }
#topbar-gap { flex: 1; }
#search { background: var(--bg); border: 1px solid var(--text); border-radius: 0; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); outline: none; padding: 5px 12px; width: 190px; transition: border-color 0.15s; }
#search:focus { border: 2px solid var(--text); }
#user-email { font-size: 11px; color: var(--dim); }
#btn-logout { background: none; border: 1px solid var(--text); border-radius: 0; font-size: 11px; font-weight: 700; color: var(--text); padding: 4px 10px; transition: all 0.15s; }
#btn-logout:hover { background: var(--text); color: var(--bg); }

#main { display: flex; flex: 1; overflow: hidden; }
#sidebar { width: 185px; min-width: 185px; background: var(--bg); border-right: 3px solid var(--text); display: flex; flex-direction: column; }
#sidebar-head { padding: 12px 16px 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text); border-bottom: 1px solid var(--text); }
#folder-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.fld { width: 100%; background: none; border: none; display: flex; align-items: center; gap: 6px; padding: 8px 14px; font-size: 12.5px; font-weight: 700; color: var(--dim); text-align: left; transition: color 0.1s, background 0.1s; position: relative; }
.fld:hover { color: var(--text); background: var(--bg3); }
.fld.on { color: var(--text); background: var(--bg3); }
.fld.on::before { content: '>'; position: absolute; left: 8px; color: var(--text); font-weight: 700; }
.fld-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fld-n { font-size: 10px; color: var(--dim); }
.fld-x { display: none; background: none; border: none; color: var(--dim); font-size: 14px; padding: 0; line-height: 1; transition: color 0.1s; cursor: pointer; }
.fld:hover .fld-x { display: block; }
.fld-x:hover { color: var(--text); }
#sidebar-foot { border-top: 3px solid var(--text); padding: 10px 12px; }
#btn-folder { background: none; border: none; font-size: 11px; font-weight: 700; color: var(--text); letter-spacing: 0.06em; padding: 8px 0; width: 100%; text-align: left; transition: opacity 0.1s; border-bottom: 1px solid var(--text); cursor: pointer; }
#btn-folder:hover { opacity: 0.7; }
#folder-form { display: none; gap: 4px; align-items: center; }
#folder-form.on { display: flex; }
#folder-inp { flex: 1; background: var(--bg); border: 1px solid var(--text); border-radius: 0; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); outline: none; padding: 4px 8px; }
#folder-ok { background: none; border: none; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text); padding: 2px 4px; font-weight: 700; cursor: pointer; }

#notes-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#notes-head { display: flex; align-items: center; gap: 10px; padding: 10px 18px; border-bottom: 1px solid var(--text); background: var(--bg); flex-shrink: 0; }
#folder-lbl { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
#notes-ct { font-size: 11px; color: var(--dim); }
#btn-new { background: var(--text); border: none; border-radius: 0; font-size: 12px; font-weight: 700; color: var(--bg); padding: 5px 14px; letter-spacing: 0.04em; transition: opacity 0.15s; cursor: pointer; }
#btn-new:hover { opacity: 0.8; }

#grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; padding: 18px; align-content: start; background: var(--bg); }
.card { border: 1px solid var(--text); border-radius: 0; padding: 16px; cursor: pointer; display: flex; flex-direction: column; gap: 10px; min-height: 140px; transition: border-color 0.15s, box-shadow 0.15s; background: var(--bg2); }
.card:hover { background: var(--bg3); }
.card.on { border: 2px solid var(--text); box-shadow: 0 0 0 2px var(--bg); }
.card-ttl { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.4; }
.card-ttl.empty { color: var(--dim); font-style: italic; font-weight: 400; }
.card-pre { font-size: 11.5px; color: var(--dim); line-height: 1.7; flex: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; white-space: pre-wrap; }
.card-foot { font-size: 10px; color: var(--dim); display: flex; justify-content: space-between; align-items: center; gap: 6px; flex-wrap: wrap; }
.card-badges { display: flex; gap: 4px; }
.card-tag { border: 1px solid var(--text); padding: 1px 5px; font-size: 9px; letter-spacing: 0.06em; color: var(--text); border-radius: 0; font-weight: 700; background: transparent; }
.card[data-c="green"] .card-tag { border: 2px solid #00aa00; color: #00aa00; }
.card[data-c="cyan"] .card-tag { border: 2px solid #0088ff; color: #0088ff; }
.card[data-c="purple"] .card-tag { border: 2px solid #aa00ff; color: #aa00ff; }
.card[data-c="orange"] .card-tag { border: 2px solid #ff8800; color: #ff8800; }
.card[data-c="red"] .card-tag { border: 2px solid #ff0000; color: #ff0000; }
.card[data-c="yellow"] .card-tag { border: 2px solid #ffaa00; color: #ffaa00; }
#grid-empty { grid-column: 1/-1; display: flex; align-items: center; justify-content: center; min-height: 160px; font-size: 12px; color: var(--dim); font-style: italic; }

#editor { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 200; }
#editor.on { display: flex; }
#editor-bar { display: flex; align-items: center; gap: 14px; padding: 10px 24px; border-bottom: 1px solid var(--text); background: var(--bg); flex-shrink: 0; flex-wrap: wrap; }
#btn-back { background: none; border: none; font-size: 12px; font-weight: 700; color: var(--text); padding: 0; transition: color 0.1s; cursor: pointer; }
#btn-back:hover { opacity: 0.7; }
#ed-folder { font-size: 11px; color: var(--text); font-weight: 700; }
#colors { display: flex; gap: 7px; align-items: center; }
.cdot { width: 14px; height: 14px; border-radius: 0; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s; }
.cdot:hover { transform: scale(1.25); }
.cdot.on { border: 2px solid var(--text); }
.cdot[data-c="green"] { background: #00aa00; }
.cdot[data-c="cyan"] { background: #0088ff; }
.cdot[data-c="purple"] { background: #aa00ff; }
.cdot[data-c="orange"] { background: #ff8800; }
.cdot[data-c="red"] { background: #ff0000; }
.cdot[data-c="yellow"] { background: #ffaa00; }
#bar-gap { flex: 1; }
#mv-folder { background: var(--bg); border: 1px solid var(--text); border-radius: 0; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text); outline: none; padding: 4px 8px; cursor: pointer; }
#save-status { font-size: 10px; color: var(--dim); min-width: 60px; text-align: right; }
#btn-del { background: none; border: none; font-size: 11px; font-weight: 700; color: var(--text); padding: 0; transition: color 0.1s; cursor: pointer; }
#btn-del:hover { opacity: 0.7; }
#ed-body { flex: 1; overflow-y: auto; padding: 36px 52px; display: flex; flex-direction: column; gap: 0; max-width: 820px; width: 100%; margin: 0 auto; }
#ed-title { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; border: none; outline: none; background: transparent; color: var(--text); width: 100%; margin-bottom: 24px; border-bottom: 1px solid var(--text); padding-bottom: 16px; line-height: 1.3; }
#section-text { display: flex; flex-direction: column; margin-bottom: 32px; }
.section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; }
#ed-text { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 400; line-height: 2; border: none; outline: none; background: transparent; color: var(--text); width: 100%; resize: none; min-height: 140px; overflow: hidden; }
#ed-divider { border: none; border-top: 1px solid var(--text); margin-bottom: 28px; }
#section-tasks { display: flex; flex-direction: column; }
.trow { display: flex; align-items: baseline; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--text); }
.tbox { appearance: none; width: 15px; height: 15px; border: 1.5px solid var(--text); background: none; cursor: pointer; flex-shrink: 0; margin-top: 3px; position: relative; border-radius: 0; transition: border-color 0.15s; }
.tbox:checked { border-color: var(--text); }
.tbox:checked::after { content: '✓'; position: absolute; top: -3px; left: 1px; font-size: 13px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-weight: 700; }
.tinp { flex: 1; background: none; border: none; outline: none; font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 400; color: var(--text); line-height: 1.7; }
.tinp.done { color: var(--dim); text-decoration: line-through; }
.trm { background: none; border: none; font-family: 'JetBrains Mono', monospace; font-size: 14px; cursor: pointer; color: var(--dim); padding: 0; opacity: 0; transition: opacity 0.1s, color 0.1s; }
.trow:hover .trm { opacity: 1; }
.trm:hover { color: var(--text); }
#btn-task { background: none; border: none; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: var(--text); padding: 12px 0 4px; text-align: left; letter-spacing: 0.04em; transition: opacity 0.1s; cursor: pointer; }
#btn-task:hover { opacity: 0.7; }

#btn-menu { display: none; background: none; border: none; font-size: 15px; color: var(--text); padding: 0; cursor: pointer; }
@media (max-width: 640px) {
  #sidebar { position: absolute; left: -100%; top: 0; bottom: 0; z-index: 50; transition: left 0.2s; }
  #sidebar.on { left: 0; box-shadow: 4px 0 30px rgba(0,0,0,0.6); }
  #btn-menu { display: block; }
  #grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); padding: 12px; gap: 8px; }
  #ed-body { padding: 20px; }
  #search { width: 120px; }
  #user-email { display: none; }
}
</style>
</head>
<body>

<div id="auth-screen">
  <div id="auth-box">
    <div>
      <div id="auth-logo">> Carlos Notes //</div>
      <div id="auth-sub">tu espacio de notas personal</div>
    </div>
    <div id="auth-tabs">
      <button class="auth-tab on" data-tab="login">iniciar sesión</button>
      <button class="auth-tab" data-tab="register">registrarse</button>
    </div>
    <div class="auth-field">
      <div class="auth-label">email</div>
      <input class="auth-input" id="auth-email" type="email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="auth-field">
      <div class="auth-label">contraseña</div>
      <input class="auth-input" id="auth-pass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div id="auth-err"></div>
    <div id="auth-ok"></div>
    <button id="auth-btn">iniciar sesión</button>
  </div>
</div>

<div id="topbar">
  <button id="btn-menu">≡</button>
  <span id="logo">> Carlos Notes //</span>
  <div id="topbar-gap"></div>
  <input id="search" type="text" placeholder="/ buscar…">
  <span id="user-email"></span>
  <button id="btn-logout">cerrar sesión</button>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-head">carpetas</div>
    <div id="folder-list"></div>
    <div id="sidebar-foot">
      <button id="btn-folder">+ nueva carpeta</button>
      <div id="folder-form">
        <input id="folder-inp" type="text" placeholder="nombre…" maxlength="28">
        <button id="folder-ok">↵</button>
      </div>
    </div>
  </div>
  <div id="notes-panel">
    <div id="notes-head">
      <span id="folder-lbl">todas las notas</span>
      <span id="notes-ct"></span>
      <button id="btn-new">+ nueva nota</button>
    </div>
    <div id="grid"></div>
  </div>
</div>

<div id="editor">
  <div id="editor-bar">
    <button id="btn-back">← volver</button>
    <span id="ed-folder"></span>
    <div id="colors">
      <div class="cdot" data-c="green"></div>
      <div class="cdot" data-c="cyan"></div>
      <div class="cdot" data-c="purple"></div>
      <div class="cdot" data-c="orange"></div>
      <div class="cdot" data-c="red"></div>
      <div class="cdot" data-c="yellow"></div>
    </div>
    <div id="bar-gap"></div>
    <select id="mv-folder"></select>
    <span id="save-status"></span>
    <button id="btn-del">— eliminar</button>
  </div>
  <div id="ed-body">
    <input id="ed-title" type="text" placeholder="título_">
    <div id="section-text">
      <div class="section-label">// texto</div>
      <textarea id="ed-text" placeholder="escribe aquí…" rows="6"></textarea>
    </div>
    <hr id="ed-divider">
    <div id="section-tasks">
      <div class="section-label">// tareas</div>
      <div id="task-list"></div>
      <button id="btn-task">+ añadir tarea</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/+esm';

const SUPA_URL = 'https://prymoniznxxmcxkyhrqf.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByeW1vbml6bnh4bWN4a3locnFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzk0NDIsImV4cCI6MjA5MzkxNTQ0Mn0.YBKur19cjCne3_KntpC3ny7QAbsBz7_1bjXyfUb1zNc';
const sb = createClient(SUPA_URL, SUPA_KEY);

const COLS = ['green','cyan','purple','orange','red','yellow'];
const uid  = () => crypto.randomUUID();

let folders = [], notes = [], activeFolder = 'all', activeNote = null;
let saveTimer = null;

function fmt(ts) {
  const d = new Date(ts), n = new Date();
  if (d.toDateString() === n.toDateString())
    return d.toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' });
  return d.toLocaleDateString('es', { day:'2-digit', month:'2-digit' });
}

async function initAuth() {
  const authScreen = document.getElementById('auth-screen');
  const authEmail  = document.getElementById('auth-email');
  const authPass   = document.getElementById('auth-pass');
  const authBtn    = document.getElementById('auth-btn');
  const authErr    = document.getElementById('auth-err');
  const authOk     = document.getElementById('auth-ok');
  let authMode = 'login';

  document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      authMode = tab.dataset.tab;
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('on', t.dataset.tab===authMode));
      authBtn.textContent = authMode==='login' ? 'iniciar sesión' : 'crear cuenta';
      authErr.textContent = ''; authOk.textContent = '';
    });
  });

  authBtn.addEventListener('click', async () => {
    authErr.textContent = ''; authOk.textContent = '';
    const email = authEmail.value.trim();
    const pass  = authPass.value;
    if (!email || !pass) { authErr.textContent = 'rellena email y contraseña'; return; }
    authBtn.disabled = true; authBtn.textContent = '...';

    if (authMode === 'login') {
      const { error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) { authErr.textContent = 'credenciales incorrectas'; }
    } else {
      const { error } = await sb.auth.signUp({ email, password: pass });
      if (error) { authErr.textContent = error.message; }
      else { authOk.textContent = 'cuenta creada — ya puedes iniciar sesión'; authMode='login'; }
    }
    authBtn.disabled = false;
    authBtn.textContent = authMode==='login' ? 'iniciar sesión' : 'crear cuenta';
  });

  authEmail.addEventListener('keydown', e => { if (e.key==='Enter') authPass.focus(); });
  authPass.addEventListener('keydown',  e => { if (e.key==='Enter') authBtn.click(); });

  document.getElementById('btn-logout').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.reload();
  });

  sb.auth.onAuthStateChange(async (event, session) => {
    if (session) {
      authScreen.style.display = 'none';
      document.getElementById('user-email').textContent = session.user.email;
      await loadAll();
    } else {
      authScreen.style.display = 'flex';
      authBtn.textContent = 'iniciar sesión';
      folders = []; notes = []; activeFolder = 'all'; activeNote = null;
      render();
    }
  });
}

async function loadAll() {
  document.getElementById('grid').innerHTML = '<div id="grid-empty">// cargando…</div>';
  const [{ data: fData }, { data: nData }] = await Promise.all([
    sb.from('folders').select('*').order('created_at'),
    sb.from('notes').select('*').order('updated_at', { ascending: false }),
  ]);
  folders = fData || [];
  notes   = nData || [];
  render();
}

async function saveNote(n) {
  setSaveStatus('guardando…');
  await sb.from('notes').upsert({
    id: n.id, folder_id: n.folder_id, title: n.title,
    body: n.body, tasks: n.tasks, color: n.color,
    updated_at: new Date().toISOString(),
  });
  setSaveStatus('✓ guardado');
  setTimeout(() => setSaveStatus(''), 1500);
}

function setSaveStatus(txt) {
  document.getElementById('save-status').textContent = txt;
}

function scheduleSave(n) {
  n.updated_at = new Date().toISOString();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveNote(n), 800);
}

function rFolders() {
  const c = {};
  notes.forEach(n => { c[n.folder_id] = (c[n.folder_id]||0)+1; });
  const all = [{ id:'all', name:'todas' }, ...folders];
  document.getElementById('folder-list').innerHTML = all.map(f => `
    <button class="fld ${activeFolder===f.id?'on':''}" data-id="${f.id}">
      <span class="fld-name">${f.name}</span>
      <span class="fld-n">${f.id==='all'?notes.length:(c[f.id]||0)}</span>
      ${f.id!=='all'?`<span class="fld-x" data-id="${f.id}">×</span>`:''}
    </button>`).join('');
  document.querySelectorAll('.fld').forEach(btn => {
    btn.addEventListener('click', async e => {
      const x = e.target.closest('.fld-x');
      if (x) {
        e.stopPropagation();
        if (!confirm('eliminar carpeta y sus notas?')) return;
        await sb.from('folders').delete().eq('id', x.dataset.id);
        folders = folders.filter(f => f.id !== x.dataset.id);
        notes   = notes.filter(n => n.folder_id !== x.dataset.id);
        if (activeFolder === x.dataset.id) activeFolder = 'all';
        activeNote = null; render(); return;
      }
      activeFolder = btn.dataset.id; activeNote = null; render();
      document.getElementById('sidebar').classList.remove('on');
    });
  });
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  return notes
    .filter(n => activeFolder==='all' || n.folder_id===activeFolder)
    .filter(n => !q
      || (n.title||'').toLowerCase().includes(q)
      || (n.body||'').toLowerCase().includes(q)
      || (n.tasks||[]).some(t => t.text.toLowerCase().includes(q)))
    .sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
}

function rGrid() {
  const f = folders.find(x => x.id===activeFolder);
  document.getElementById('folder-lbl').textContent = f ? f.name : 'todas las notas';
  const ns = filtered();
  document.getElementById('notes-ct').textContent = ns.length ? ns.length+' notas' : '';
  const grid = document.getElementById('grid');
  if (!ns.length) { grid.innerHTML = '<div id="grid-empty">// sin notas aún</div>'; return; }
  grid.innerHTML = ns.map(n => {
    const hasTasks = n.tasks && n.tasks.length > 0;
    const hasText  = n.body && n.body.trim().length > 0;
    let lines = [];
    if (hasText)  lines.push(n.body.trim());
    if (hasTasks) lines.push(n.tasks.map(t=>(t.done?'[x] ':'[ ] ')+t.text).join('\n'));
    const pre = lines.join('\n\n') || '—';
    const badges = [
      hasText  ? '<span class="card-tag">txt</span>' : '',
      hasTasks ? '<span class="card-tag">tareas</span>' : '',
    ].filter(Boolean).join('');
    return `<div class="card ${activeNote===n.id?'on':''}" data-id="${n.id}" data-c="${n.color||''}">
      <div class="card-ttl ${!n.title?'empty':''}">${n.title||'sin título'}</div>
      <div class="card-pre">${pre}</div>
      <div class="card-foot"><span>${fmt(n.updated_at)}</span><div class="card-badges">${badges}</div></div>
    </div>`;
  }).join('');
  document.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', () => { activeNote = c.dataset.id; rGrid(); openEd(); });
  });
}

function openEd() {
  const n = notes.find(x => x.id===activeNote); if (!n) return;
  const f = folders.find(x => x.id===n.folder_id);
  document.getElementById('ed-folder').textContent = f ? f.name : '';
  document.getElementById('ed-title').value = n.title || '';
  document.getElementById('ed-text').value  = n.body  || '';
  document.querySelectorAll('.cdot').forEach(d => d.classList.toggle('on', d.dataset.c===n.color));
  const sel = document.getElementById('mv-folder');
  sel.innerHTML = folders.map(f =>
    `<option value="${f.id}" ${n.folder_id===f.id?'selected':''}>${f.name}</option>`
  ).join('');
  rTasks(n);
  document.getElementById('editor').classList.add('on');
  setTimeout(() => {
    const ta = document.getElementById('ed-text');
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
    if (!n.title) document.getElementById('ed-title').focus();
    else ta.focus();
  }, 50);
}

function closeEd() { document.getElementById('editor').classList.remove('on'); }

function rTasks(n) {
  const list = document.getElementById('task-list');
  list.innerHTML = (n.tasks||[]).map((t,i) => `
    <div class="trow">
      <input type="checkbox" class="tbox" data-i="${i}" ${t.done?'checked':''}>
      <input type="text" class="tinp ${t.done?'done':''}" data-i="${i}" value="${t.text.replace(/"/g,'&quot;')}" placeholder="tarea…">
      <button class="trm" data-i="${i}">×</button>
    </div>`).join('');

  list.querySelectorAll('.tbox').forEach(cb => {
    cb.addEventListener('change', () => {
      const n = notes.find(x=>x.id===activeNote);
      n.tasks[parseInt(cb.dataset.i)].done = cb.checked;
      cb.nextElementSibling.classList.toggle('done', cb.checked);
      scheduleSave(n); rGrid();
    });
  });
  list.querySelectorAll('.tinp').forEach(inp => {
    inp.addEventListener('input', () => {
      const n = notes.find(x=>x.id===activeNote);
      n.tasks[parseInt(inp.dataset.i)].text = inp.value; scheduleSave(n); rGrid();
    });
    inp.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); addTask(); }});
  });
  list.querySelectorAll('.trm').forEach(b => {
    b.addEventListener('click', () => {
      const n = notes.find(x=>x.id===activeNote);
      n.tasks.splice(parseInt(b.dataset.i), 1); scheduleSave(n); rTasks(n); rGrid();
    });
  });
}

function addTask() {
  const n = notes.find(x=>x.id===activeNote); if (!n) return;
  n.tasks = n.tasks||[]; n.tasks.push({ text:'', done:false });
  scheduleSave(n); rTasks(n); rGrid();
  setTimeout(() => { const ins = document.querySelectorAll('.tinp'); if (ins.length) ins[ins.length-1].focus(); }, 40);
}

async function newNote() {
  const folder_id = activeFolder==='all' ? (folders[0]?.id||null) : activeFolder;
  if (!folder_id) { alert('crea una carpeta primero'); return; }
  const { data: { user } } = await sb.auth.getUser();
  const color = COLS[notes.length % COLS.length];
  const { data, error } = await sb.from('notes').insert({
    folder_id, user_id: user.id, title:'', body:'', tasks:[], color,
    updated_at: new Date().toISOString(),
  }).select().single();
  if (!error) { notes.unshift(data); activeNote = data.id; render(); openEd(); }
}

function render() { rFolders(); rGrid(); }

document.getElementById('btn-folder').addEventListener('click', () => {
  document.getElementById('btn-folder').style.display = 'none';
  document.getElementById('folder-form').classList.add('on');
  document.getElementById('folder-inp').focus();
});

async function doFolder() {
  const inp  = document.getElementById('folder-inp');
  const name = inp.value.trim().toLowerCase(); if (!name) return;
  const { data: { user } } = await sb.auth.getUser();
  const { data, error } = await sb.from('folders').insert({ name, user_id: user.id }).select().single();
  if (!error) { folders.push(data); }
  inp.value = '';
  document.getElementById('btn-folder').style.display = '';
  document.getElementById('folder-form').classList.remove('on');
  render();
}

document.getElementById('folder-ok').addEventListener('click', doFolder);
document.getElementById('folder-inp').addEventListener('keydown', e => {
  if (e.key==='Enter') doFolder();
  if (e.key==='Escape') { document.getElementById('btn-folder').style.display=''; document.getElementById('folder-form').classList.remove('on'); }
});

document.getElementById('ed-title').addEventListener('input', e => {
  const n = notes.find(x=>x.id===activeNote); if (!n) return;
  n.title = e.target.value; scheduleSave(n); rGrid();
});

document.getElementById('ed-text').addEventListener('input', e => {
  const n = notes.find(x=>x.id===activeNote); if (!n) return;
  n.body = e.target.value; scheduleSave(n); rGrid();
  e.target.style.height = 'auto';
  e.target.style.height = e.target.scrollHeight + 'px';
});

document.querySelectorAll('.cdot').forEach(d => {
  d.addEventListener('click', () => {
    const n = notes.find(x=>x.id===activeNote); if (!n) return;
    n.color = d.dataset.c; scheduleSave(n);
    document.querySelectorAll('.cdot').forEach(x => x.classList.toggle('on', x.dataset.c===n.color));
    rGrid();
  });
});

document.getElementById('btn-task').addEventListener('click', addTask);
document.getElementById('btn-del').addEventListener('click', async () => {
  if (!activeNote || !confirm('eliminar nota?')) return;
  await sb.from('notes').delete().eq('id', activeNote);
  notes = notes.filter(n=>n.id!==activeNote); activeNote = null;
  closeEd(); render();
});

document.getElementById('mv-folder').addEventListener('change', async e => {
  const n = notes.find(x=>x.id===activeNote); if (!n) return;
  n.folder_id = e.target.value;
  const f = folders.find(x=>x.id===n.folder_id);
  document.getElementById('ed-folder').textContent = f ? f.name : '';
  scheduleSave(n); rFolders(); rGrid();
});

document.getElementById('btn-back').addEventListener('click', closeEd);
document.getElementById('btn-new').addEventListener('click', newNote);
document.getElementById('search').addEventListener('input', rGrid);
document.getElementById('btn-menu').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('on'));
document.addEventListener('keydown', e => { if (e.key==='Escape') closeEd(); });

initAuth();
</script>
</body>
</html>
